<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Création de sites web avec hébergement à 0 euro par mois</title>
  <desc id="desc">Image publicitaire pour une offre de création de sites web professionnels avec hébergement mensuel possible à zéro euro.</desc>
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#effafa"/>
      <stop offset=".5" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#ddeafa"/>
    </linearGradient>
    <linearGradient id="navyPanel" x1="72" y1="70" x2="530" y2="558" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0d3a51"/>
      <stop offset="1" stop-color="#09263d"/>
    </linearGradient>
    <linearGradient id="tealButton" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1fc7c0"/>
      <stop offset="1" stop-color="#167d9f"/>
    </linearGradient>
    <radialGradient id="softGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(930 160) rotate(135) scale(460 360)">
      <stop offset="0" stop-color="#3935d1" stop-opacity=".18"/>
      <stop offset="1" stop-color="#3935d1" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="26" flood-color="#0a2740" flood-opacity=".14"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#page)"/>
  <rect width="1200" height="630" fill="url(#softGlow)"/>

  <g opacity=".72">
    <circle cx="1014" cy="138" r="62" fill="#e3fbf7"/>
    <circle cx="1072" cy="284" r="86" fill="none" stroke="#18a7a1" stroke-opacity=".13" stroke-width="16"/>
    <circle cx="940" cy="232" r="126" fill="#dfe8ff" opacity=".48"/>
    <circle cx="940" cy="232" r="82" fill="none" stroke="#3935d1" stroke-opacity=".1" stroke-width="16"/>
  </g>

  <rect x="72" y="70" width="434" height="488" rx="42" fill="url(#navyPanel)" filter="url(#shadow)"/>
  <circle cx="188" cy="178" r="64" fill="#14485b"/>
  <circle cx="188" cy="178" r="38" fill="#1fc7c0" opacity=".9"/>
  <rect x="168" y="172" width="40" height="12" rx="1" fill="#ffffff"/>
  <rect x="182" y="158" width="12" height="40" rx="1" fill="#ffffff"/>
  <text x="138" y="306" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="850">Hébergement</text>
  <text x="138" y="402" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="94" font-weight="900">0 €</text>
  <text x="138" y="452" fill="#bfe9e7" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="800">/ mois</text>
  <path d="M138 494h238" fill="none" stroke="#1fc7c0" stroke-width="6" stroke-linecap="round"/>
  <text x="138" y="528" fill="#d9f6f4" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">selon la solution choisie</text>

  <text x="572" y="144" fill="#167d9f" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="850" letter-spacing="2">CRÉATION DE SITE WEB</text>
  <text x="572" y="222" fill="#0a2740" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="900">Un site pro pour</text>
  <text x="572" y="292" fill="#0a2740" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="900">votre cabinet</text>
  <text x="574" y="356" fill="#5c7080" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="650">Design moderne et version mobile,</text>
  <text x="574" y="398" fill="#5c7080" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="650">contact clair, Doctolib si compatible.</text>

  <g transform="translate(574 452)">
    <rect width="238" height="58" rx="29" fill="url(#tealButton)"/>
    <text x="119" y="38" text-anchor="middle" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="850">À partir de 350 €</text>
  </g>

  <g transform="translate(842 452)">
    <rect width="224" height="58" rx="29" fill="#ffffff" stroke="#cfe1e8" stroke-width="2"/>
    <text x="112" y="38" text-anchor="middle" fill="#0a2740" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="850">Devis rapide</text>
  </g>
</svg>
